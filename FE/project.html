<!DOCTYPE html>
<html lang="en">

<head>
    <title>Anushma Radhakrishnan</title>

    <link rel="icon" type="image/png" href="./images/anu7.avif">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Anushma</a>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section id="hero-section" class="hero-wrap js-fullheight">
        <div class="overlay"></div>

        <div class="container">
            <div class="text-center">
                <h1 id="project-title"></h1>
            </div>
        </div>
    </section>

    <!-- PROJECT DETAILS -->
    <section>
        <div class="container">

            <h2 id="project-heading"></h2>
            <p id="project-description"></p>

            <strong>Features:</strong>
            <p id="project-features"></p>

            <strong>Technologies:</strong>
            <p id="project-technologies"></p>

            <h3>Screenshot</h3>
            <img id="project-screenshot" width="100%">

            <h3>Links</h3>

            <div id="github-block">
                <a id="github-link" target="_blank"></a>
            </div>

            <div id="live-block">
                <a id="live-link" target="_blank"></a>
            </div>

            <div id="video-block">
                <a id="video-link" target="_blank"></a>
            </div>

        </div>
    </section>

    <!-- SCRIPT -->
    <script>

        const BASE_URL = "https://porfolio-latest-1.onrender.com"

        const params = new URLSearchParams(window.location.search)
        const id = params.get("id")

        fetch(`${BASE_URL}/api/projects/${id}`)
            .then(res => res.json())
            .then(project => {

                document.getElementById("project-title").innerText = project.title
                document.getElementById("project-heading").innerText = project.title
                document.getElementById("project-description").innerText = project.description
                document.getElementById("project-features").innerText = project.features
                document.getElementById("project-technologies").innerText = project.technologies

                // GitHub
                if (project.github) {
                    document.getElementById("github-link").href = project.github
                    document.getElementById("github-link").innerText = "View GitHub"
                } else {
                    document.getElementById("github-block").style.display = "none"
                }

                // Live
                if (project.livelink) {
                    document.getElementById("live-link").href = project.livelink
                    document.getElementById("live-link").innerText = "View Live"
                } else {
                    document.getElementById("live-block").style.display = "none"
                }

                // Video
                if (project.video) {
                    document.getElementById("video-link").href = project.video
                    document.getElementById("video-link").innerText = "Watch Video"
                } else {
                    document.getElementById("video-block").style.display = "none"
                }

                // Images (FIXED)
                document.getElementById("hero-section").style.backgroundImage =
                    `url(${BASE_URL}/uploads/${project.image})`

                document.getElementById("project-screenshot").src =
                    `${BASE_URL}/uploads/${project.screenshot}`

            })
            .catch(err => {
                console.error("Error:", err)
            })

    </script>

</body>
</html>
